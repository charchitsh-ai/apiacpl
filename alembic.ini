# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = app/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to use in generate_slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow scientists to compile .pyc files
# sourceless = false

# version location specification; this defaults to app/migrations/versions.
# When using multiple version directories, initial directory must exist.
# version_locations = %(here)s/bar:%(here)s/bat:app/migrations/versions

# version_path_separator = :

# logging configuration file
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/ayka_care


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
